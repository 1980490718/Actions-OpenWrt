name: 🛠️ Build LEDE (ipq40xx) - Ubuntu 22.04 Optimized

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TARGET: ipq40xx
  CONFIG_FILE: AP4220-128M.config
  CACHE_KEY: ${{ github.run_id }}-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-22.04  # 使用当前 LTS 版本

    steps:
      - name: "🔍 Checkout Repository"
        uses: actions/checkout@v4

      - name: "⚙️ Fix Python Dependencies"  # 关键修复点
        run: |
          sudo apt-get update
          sudo apt-get install -y --download-only python3-all python3-pip

      - name: "⚙️ Install Python 3"
        run: |
          sudo apt-get install -y python3-all python3-pip
          python3 -m pip install --upgrade pip setuptools wheel

      - name: "🔄 Update Package List"
        run: |
          sudo apt-get update

      - name: "📦 Install Build Tools"
        run: |
          sudo apt-get install -y build-essential clang flex g++ gawk gcc-multilib \
            gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev

      - name: "📥 Clone LEDE Source"
        run: |
          git clone --depth=1 https://github.com/coolsnowwolf/lede.git
          cd lede
          cp ../${{ env.CONFIG_FILE }} .config

      - name: "🔧 Cache Check (Toolchain + DL)"
        id: cache-check
        uses: actions/cache@v3
        with:
          path: |
            lede/dl
            lede/staging_dir/toolchain-*
          key: ${{ runner.os }}-${{ env.TARGET }}-${{ hashFiles('lede/feeds.conf.default') }}-${{ github.sha }}

      - name: "🔄 Update Feeds (If Cache Miss)"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd lede
          ./scripts/feeds update -a

      - name: "📥 Install Feeds (If Cache Miss)"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd lede
          ./scripts/feeds install -a

      - name: "📦 Download Toolchain Dependencies (If Cache Miss)"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd lede
          make download -j$(nproc) V=s  # 使用 make download 命令下载依赖

      - name: "⚙️ Install Toolchain Dependencies (If Cache Miss)"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd lede
          make toolchain/install -j$(nproc) V=s

      - name: "🛠️ Compile Toolchain (If Cache Miss)"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          cd lede
          make toolchain/install -j$(nproc) V=s

      - name: "📁 Enter LEDE Directory"
        run: cd lede && pwd

      - name: "⚙️ Run Make Defconfig"
        run: |
          make defconfig
        working-directory: lede

      - name: "📥 Download Packages"
        run: |
          make download -j$(nproc)
        working-directory: lede

      - name: "🏗️ Compile Firmware"
        run: |
          make -j$(nproc) V=s
        working-directory: lede

      - name: "📌 Upload Firmware Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: lede-firmware-${{ env.TARGET }}
          path: lede/bin/targets/${{ env.TARGET }}/*

      - name: "📦 Create Cache Archive"
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          tar czf cache_${{ env.TARGET }}_$(date +%Y%m%d).tar.gz lede/dl lede/staging_dir/toolchain-*
          echo "CACHE_FILE=cache_${{ env.TARGET }}_$(date +%Y%m%d).tar.gz" >> $GITHUB_ENV

      - name: "📌 Upload Cache Artifact"
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: lede-cache-${{ env.TARGET }}
          path: ${{ env.CACHE_FILE }}

      - name: "🚀 Upload to Releases"
        uses: softprops/action-gh-release@v1
        with:
          files: |
            lede/bin/targets/${{ env.TARGET }}/*/*
            ${{ env.CACHE_FILE }}
          tag_name: build-${{ env.TARGET }}-$(date +%Y%m%d)
          body: |
            🔥 Auto-built LEDE firmware for ${{ env.TARGET }}
            📦 Includes toolchain cache for faster rebuilds